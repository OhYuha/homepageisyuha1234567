<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server MP3 Booster</title>
    <style>
        :root { --primary: #00d2ff; --bg: #121212; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .player-card { background: #1e1e1e; padding: 30px; border-radius: 25px; width: 90%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); text-align: center; border: 1px solid #333; }
        
        h2 { font-weight: 300; margin-bottom: 30px; color: var(--primary); }

        /* 재생 바 */
        .seek-container { margin-bottom: 25px; }
        input[type="range"] { width: 100%; height: 6px; border-radius: 5px; appearance: none; background: #333; outline: none; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 15px; height: 15px; background: var(--primary); border-radius: 50%; }
        
        .time-info { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-top: 8px; }

        /* 컨트롤러 */
        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 30px; }
        .btn { background: none; border: 2px solid white; color: white; border-radius: 50%; width: 60px; height: 60px; cursor: pointer; font-size: 20px; transition: 0.2s; }
        .btn:active { transform: scale(0.9); border-color: var(--primary); color: var(--primary); }

        /* 증폭 바 섹션 */
        .boost-box { background: #252525; padding: 20px; border-radius: 15px; }
        .boost-label { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 10px; font-weight: bold; }
        #boost-val { color: var(--primary); font-size: 18px; }
        .warning { font-size: 10px; color: #ff4757; margin-top: 10px; opacity: 0.7; }
    </style>
</head>
<body>

<div class="player-card">
    <h2>Music Player</h2>

    <!-- 오디오 소스 설정 -->
    <!-- crossorigin="anonymous"는 서버 설정에 따라 필요할 수 있습니다 -->
    <audio id="audio" crossorigin="anonymous">
        <source src="YOUR_MUSIC_URL.mp3" type="audio/mpeg">
    </audio>

    <!-- 재생 바 (Seek Bar) -->
    <div class="seek-container">
        <input type="range" id="seek-bar" value="0" min="0" step="0.1">
        <div class="time-info">
            <span id="current-time">0:00</span>
            <span id="duration-time">0:00</span>
        </div>
    </div>

    <!-- 재생 버튼 -->
    <div class="controls">
        <button class="btn" id="play-pause">▶</button>
    </div>

    <!-- 실제 500% 증폭 슬라이더 -->
    <div class="boost-box">
        <div class="boost-label">
            <span>VOLUME BOOST</span>
            <span><span id="boost-val">100</span>%</span>
        </div>
        <input type="range" id="boost-slider" min="0.5" max="5" step="0.1" value="1">
        <div class="warning">※ 100% 초과 증폭 시 스피커 손상에 주의하세요.</div>
    </div>
</div>

<script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('play-pause');
    const seekBar = document.getElementById('seek-bar');
    const boostSlider = document.getElementById('boost-slider');
    const boostVal = document.getElementById('boost-val');
    const currTimeTxt = document.getElementById('current-time');
    const durTimeTxt = document.getElementById('duration-time');

    let audioCtx;
    let source;
    let gainNode;

    // 1. 오디오 엔진 초기화 (모바일은 클릭 시 생성해야 함)
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            source = audioCtx.createMediaElementSource(audio);
            gainNode = audioCtx.createGain(); // 증폭 담당 노드

            source.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            // 초기 증폭값 설정
            gainNode.gain.value = boostSlider.value;
        }
    }

    // 2. 재생/일시정지 토글
    playBtn.addEventListener('click', () => {
        initAudio(); // 클릭하는 순간 오디오 컨텍스트 활성화 (모바일 필수)
        
        if (audioCtx.state === 'suspended') audioCtx.resume();

        if (audio.paused) {
            audio.play();
            playBtn.innerText = "||";
        } else {
            audio.pause();
            playBtn.innerText = "▶";
        }
    });

    // 3. 재생 바 (Seek) 조절
    audio.addEventListener('loadedmetadata', () => {
        seekBar.max = audio.duration;
        durTimeTxt.innerText = formatTime(audio.duration);
    });

    audio.addEventListener('timeupdate', () => {
        seekBar.value = audio.currentTime;
        currTimeTxt.innerText = formatTime(audio.currentTime);
    });

    seekBar.addEventListener('input', () => {
        audio.currentTime = seekBar.value;
    });

    // 4. 진짜 500% 증폭 로직
    boostSlider.addEventListener('input', (e) => {
        const val = parseFloat(e.target.value);
        boostVal.innerText = Math.round(val * 100);
        
        if (gainNode) {
            // gain.value가 1이면 원본, 5이면 500% 증폭입니다.
            gainNode.gain.value = val;
        }
    });

    function formatTime(sec) {
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return m + ":" + (s < 10 ? '0' + s : s);
    }
</script>

</body>
</html>
