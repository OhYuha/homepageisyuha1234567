<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="player-container">
        <!-- 앨범 아트: image.png 파일이 있으니 그걸 사용합니다 -->
        <div class="album-art">
            <img src="image.png" alt="Album Art" id="cover-img" width="150">
        </div>

        <div class="info">
            <h2 id="title">My Song</h2>
            <p id="artist">Artist Name</p>
        </div>

        <!-- 스크린샷의 music.mp3 파일과 연결 -->
        <audio id="main-audio" src="music.mp3"></audio>

        <div class="controls">
            <button id="play-pause">Play</button>
        </div>

        <div class="volume-container">
            <label>Volume (Max 500%)</label>
            <input type="range" id="volume-slider" min="0" max="500" value="100">
            <span id="volume-value">100%</span>
        </div>
        <p class="warning">※ 100% 이상 증폭 시 소리가 깨질 수 있습니다.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
